apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multi-org-rag
  namespace: multi-org-rag
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - localhost
        - gwf-stuttgart.localhost
        - inge-graessle-mdb.localhost
        - albert-schweitzer-kinderdorf.localhost
        - gwf-stuttgart-automations.localhost
        - inge-graessle-mdb-automations.localhost
        - albert-schweitzer-kinderdorf-automations.localhost
      secretName: multi-org-rag-tls
