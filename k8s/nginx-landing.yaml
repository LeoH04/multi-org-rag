# ============================================================
# Nginx — Reverse Proxy + Landing Page (custom image)
#
# Build from project root:
#   docker build -f k8s/Dockerfile.nginx-landing -t localhost:32000/nginx-landing:latest .
#   docker push localhost:32000/nginx-landing:latest
# Then update the image below.
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-landing
  namespace: multi-org-rag
  labels:
    app: nginx-landing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-landing
  template:
    metadata:
      labels:
        app: nginx-landing
    spec:
      containers:
        - name: nginx
          image: localhost:32000/nginx-landing:latest
          ports:
            - containerPort: 80
          env:
            - name: DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: multi-org-config
                  key: DOMAIN
            - name: ORG1_SUBDOMAIN
              valueFrom:
                configMapKeyRef:
                  name: multi-org-config
                  key: ORG1_SUBDOMAIN
            - name: N8N_ORG1_SUBDOMAIN
              valueFrom:
                configMapKeyRef:
                  name: multi-org-config
                  key: N8N_ORG1_SUBDOMAIN
          volumeMounts:
            - name: nginx-template
              mountPath: /etc/nginx/templates
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
      volumes:
        - name: nginx-template
          configMap:
            name: nginx-config

---
# Expose nginx on port 80.
# Change type to NodePort or ClusterIP depending on your setup.
apiVersion: v1
kind: Service
metadata:
  name: nginx-landing
  namespace: multi-org-rag
spec:
  type: ClusterIP
  selector:
    app: nginx-landing
  ports:
    - port: 80
      targetPort: 80
