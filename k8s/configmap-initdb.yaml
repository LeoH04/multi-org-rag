# ============================================================
# PostgreSQL init script — creates the AIDAHO Open WebUI database.
# Runs only on first startup (empty data volume).
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-initdb
  namespace: multi-org-rag
data:
  init-multi-db.sql: |
    -- AIDAHO Copilot database
    CREATE DATABASE openwebui_aidaho;
