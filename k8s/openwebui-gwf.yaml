# ============================================================
# GWF Wohnungsgenossenschaft eG — Open WebUI
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui-gwf
  namespace: multi-org-rag
  labels:
    app: openwebui-gwf
    org: gwf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openwebui-gwf
  template:
    metadata:
      labels:
        app: openwebui-gwf
        org: gwf
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo "Waiting for postgres..."; sleep 2; done']
      containers:
        - name: openwebui
          image: ghcr.io/open-webui/open-webui:v0.8.12
          ports:
            - containerPort: 8080
          # Shared OpenWebUI config (RAG, embedding, tika, etc.)
          envFrom:
            - configMapRef:
                name: openwebui-shared-config
          # Per-instance overrides
          env:
            # Database
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: multi-org-secrets
                  key: DATABASE_URL_GWF
            # LLM backend
            - name: DEFAULT_MODELS
              valueFrom:
                configMapKeyRef:
                  name: multi-org-config
                  key: VLLM_MODEL_NAME
            - name: OPENAI_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: multi-org-secrets
                  key: VLLM_API_KEY
            # Reranker API key
            - name: RAG_EXTERNAL_RERANKER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: multi-org-secrets
                  key: RERANK_API_KEY
            # Tavily
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: multi-org-secrets
                  key: TAVILY_API_KEY
            # Branding
            - name: WEBUI_NAME
              value: "GWF Wohnungsgenossenschaft eG"
            - name: WEBUI_URL
              value: "http://gwf-stuttgart.localhost"
            # Auth
            - name: WEBUI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: multi-org-secrets
                  key: SECRET_KEY_GWF_STUTTGART
            - name: WEBUI_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: multi-org-secrets
                  key: WEBUI_ADMIN_EMAIL
            - name: WEBUI_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: multi-org-secrets
                  key: WEBUI_ADMIN_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
          resources:
            requests:
              memory: "1Gi"
              cpu: "250m"
            limits:
              memory: "4Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openwebui-gwf-data

---
apiVersion: v1
kind: Service
metadata:
  name: openwebui-gwf
  namespace: multi-org-rag
spec:
  selector:
    app: openwebui-gwf
  ports:
    - port: 8080
      targetPort: 8080
