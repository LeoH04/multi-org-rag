# ============================================================
# Kustomize — apply all manifests in order
#
# Usage:
#   kubectl apply -k k8s/
#
# Or without kustomize:
#   kubectl apply -f k8s/namespace.yaml
#   kubectl apply -f k8s/
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: multi-org-rag

resources:
  # 1. Namespace
  - namespace.yaml

  # 2. Configuration
  - configmap.yaml
  - secret.yaml
  - configmap-initdb.yaml

  # 3. Storage
  - pvc.yaml

  # 4. Shared infrastructure
  - postgres.yaml
  - tika.yaml
  - vllm-embeddings.yaml
  - vllm-chat.yaml
  - vllm-reranker.yaml

  # 5. Per-org Open WebUI
  - openwebui-gwf.yaml
  - openwebui-inge-graessle.yaml
  - openwebui-ask.yaml

  # 6. Per-org n8n
  - n8n-gwf.yaml
  - n8n-inge-graessle.yaml
  - n8n-ask.yaml

  # 7. Support services
  - admin-monitor.yaml
  - nginx-landing.yaml
  - backup-cronjob.yaml

  # 8. Ingress (enabled for server deployment)
  - ingress.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: nginx-config
    files:
      - default.conf.template=nginx.conf.template

replacements:
  # Root landing host: DOMAIN
  - source:
      kind: ConfigMap
      name: multi-org-config
      fieldPath: data.DOMAIN
    targets:
      - select:
          kind: Ingress
          name: multi-org-rag
        fieldPaths:
          - spec.rules.0.host

  # Shared second hostname segment for all subdomain routes: *.DOMAIN
  - source:
      kind: ConfigMap
      name: multi-org-config
      fieldPath: data.DOMAIN
    targets:
      - select:
          kind: Ingress
          name: multi-org-rag
        fieldPaths:
          - spec.rules.1.host
          - spec.rules.2.host
          - spec.rules.3.host
          - spec.rules.4.host
          - spec.rules.5.host
          - spec.rules.6.host
        options:
          delimiter: .
          index: 1

  # Open WebUI org subdomains: ORG*_SUBDOMAIN.DOMAIN
  - source:
      kind: ConfigMap
      name: multi-org-config
      fieldPath: data.ORG1_SUBDOMAIN
    targets:
      - select:
          kind: Ingress
          name: multi-org-rag
        fieldPaths:
          - spec.rules.1.host
        options:
          delimiter: .
          index: 0
  - source:
      kind: ConfigMap
      name: multi-org-config
      fieldPath: data.ORG2_SUBDOMAIN
    targets:
      - select:
          kind: Ingress
          name: multi-org-rag
        fieldPaths:
          - spec.rules.2.host
        options:
          delimiter: .
          index: 0
  - source:
      kind: ConfigMap
      name: multi-org-config
      fieldPath: data.ORG3_SUBDOMAIN
    targets:
      - select:
          kind: Ingress
          name: multi-org-rag
        fieldPaths:
          - spec.rules.3.host
        options:
          delimiter: .
          index: 0

  # n8n org subdomains: N8N_ORG*_SUBDOMAIN.DOMAIN
  - source:
      kind: ConfigMap
      name: multi-org-config
      fieldPath: data.N8N_ORG1_SUBDOMAIN
    targets:
      - select:
          kind: Ingress
          name: multi-org-rag
        fieldPaths:
          - spec.rules.4.host
        options:
          delimiter: .
          index: 0
  - source:
      kind: ConfigMap
      name: multi-org-config
      fieldPath: data.N8N_ORG2_SUBDOMAIN
    targets:
      - select:
          kind: Ingress
          name: multi-org-rag
        fieldPaths:
          - spec.rules.5.host
        options:
          delimiter: .
          index: 0
  - source:
      kind: ConfigMap
      name: multi-org-config
      fieldPath: data.N8N_ORG3_SUBDOMAIN
    targets:
      - select:
          kind: Ingress
          name: multi-org-rag
        fieldPaths:
          - spec.rules.6.host
        options:
          delimiter: .
          index: 0
