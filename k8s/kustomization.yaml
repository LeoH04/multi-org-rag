# ============================================================
# Kustomize — apply all manifests in order
#
# Usage:
#   kubectl apply -k k8s/
#
# Or without kustomize:
#   kubectl apply -f k8s/namespace.yaml
#   kubectl apply -f k8s/
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: multi-org-rag

resources:
  # 1. Namespace
  - namespace.yaml

  # 2. Configuration
  - configmap.yaml
  - secret.yaml
  - configmap-initdb.yaml

  # 3. Storage
  - pvc.yaml

  # 4. Shared infrastructure
  - postgres.yaml
  - tika.yaml
  - vllm-chat.yaml
  - vllm-reranker.yaml
  - vllm-nodeport.yaml

  # 5. University Open WebUI
  - openwebui-aidaho.yaml

  # 6. University n8n
  - n8n-aidaho.yaml

  # 7. Support services
  - admin-monitor.yaml
  - nginx-landing.yaml
  - backup-cronjob.yaml

  # 8. Ingress (enabled for server deployment)
  - ingress.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: nginx-config
    files:
      - default.conf.template=nginx.conf.template

replacements:
  # Shared second hostname segment for the public service routes: *.DOMAIN
  - source:
      kind: ConfigMap
      name: multi-org-config
      fieldPath: data.DOMAIN
    targets:
      - select:
          kind: Ingress
          name: multi-org-rag
        fieldPaths:
          - spec.rules.0.host
          - spec.rules.1.host
        options:
          delimiter: .
          index: 1

  # Open WebUI public hostname: ORG1_SUBDOMAIN.DOMAIN
  - source:
      kind: ConfigMap
      name: multi-org-config
      fieldPath: data.ORG1_SUBDOMAIN
    targets:
      - select:
          kind: Ingress
          name: multi-org-rag
        fieldPaths:
          - spec.rules.0.host
        options:
          delimiter: .
          index: 0

  # n8n public hostname: N8N_ORG1_SUBDOMAIN.DOMAIN
  - source:
      kind: ConfigMap
      name: multi-org-config
      fieldPath: data.N8N_ORG1_SUBDOMAIN
    targets:
      - select:
          kind: Ingress
          name: multi-org-rag
        fieldPaths:
          - spec.rules.1.host
        options:
          delimiter: .
          index: 0
