# ============================================================
# PersistentVolumeClaims — one per stateful component
# Adjust storageClassName and sizes for your cluster.
# ============================================================

# PostgreSQL data (AIDAHO database + pgvector indexes)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: multi-org-rag
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: microk8s-hostpath
  resources:
    requests:
      storage: 10Gi

