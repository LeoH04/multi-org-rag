# ============================================================
# PersistentVolumeClaims — one per stateful component
# Adjust storageClassName and sizes for your cluster.
# ============================================================

# PostgreSQL data (all 3 org databases + pgvector indexes)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: multi-org-rag
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: nfs-server
  resources:
    requests:
      storage: 10Gi

