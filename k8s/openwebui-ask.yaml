# ============================================================
# Albert-Schweitzer-Kinderdorf — Open WebUI
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui-ask
  namespace: multi-org-rag
  labels:
    app: openwebui-ask
    org: ask
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openwebui-ask
  template:
    metadata:
      labels:
        app: openwebui-ask
        org: ask
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo "Waiting for postgres..."; sleep 2; done']
      containers:
        - name: openwebui
          image: ghcr.io/open-webui/open-webui:v0.8.12
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: openwebui-shared-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: multi-org-secrets
                  key: DATABASE_URL_ASK
            - name: DEFAULT_MODELS
              valueFrom:
                configMapKeyRef:
                  name: multi-org-config
                  key: VLLM_MODEL_NAME
            - name: OPENAI_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: multi-org-secrets
                  key: VLLM_API_KEY
            - name: RAG_EXTERNAL_RERANKER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: multi-org-secrets
                  key: RERANK_API_KEY
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: multi-org-secrets
                  key: TAVILY_API_KEY
            - name: WEBUI_NAME
              value: "Albert-Schweitzer-Kinderdorf"
            - name: WEBUI_URL
              value: "http://albert-schweitzer-kinderdorf.localhost"
            - name: WEBUI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: multi-org-secrets
                  key: SECRET_KEY_ALBERT_SCHWEITZER_KINDERDORF
            - name: WEBUI_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: multi-org-secrets
                  key: WEBUI_ADMIN_EMAIL
            - name: WEBUI_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: multi-org-secrets
                  key: WEBUI_ADMIN_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openwebui-ask-data

---
apiVersion: v1
kind: Service
metadata:
  name: openwebui-ask
  namespace: multi-org-rag
spec:
  selector:
    app: openwebui-ask
  ports:
    - port: 8080
      targetPort: 8080
