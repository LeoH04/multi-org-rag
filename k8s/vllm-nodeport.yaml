# ============================================================
# External access for vLLM from the Aidaho VM / Open WebUI
#
# Configure the Open WebUI server on the Aidaho VM with:
#   OPENAI_API_BASE_URLS=http://<kubernetes-node-ip>:31538/v1
#   RAG_EXTERNAL_RERANKER_URL=http://<kubernetes-node-ip>:30424/v1/rerank
#
# Restrict these NodePorts to the Aidaho VM IP on the node firewall or
# security group. vLLM is still protected by its API key.
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: vllm-chat-nodeport
  namespace: multi-org-rag
spec:
  type: NodePort
  selector:
    app: vllm-chat
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 31538

---
apiVersion: v1
kind: Service
metadata:
  name: vllm-reranker-nodeport
  namespace: multi-org-rag
spec:
  type: NodePort
  selector:
    app: vllm-reranker
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30424
