# ============================================================
# External access for vLLM embeddings from Open WebUI
#
# Open WebUI URLs:
#   OPENAI_API_BASE_URLS=http://144.41.15.40:30800/v1
#   RAG_EXTERNAL_RERANKER_URL=http://144.41.15.40:30801/v1/rerank
#   RAG_OPENAI_API_BASE_URL=http://144.41.15.40:30802/v1
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: vllm-embeddings
  namespace: multi-org-rag
spec:
  type: NodePort
  selector:
    app: vllm-embeddings
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30802
