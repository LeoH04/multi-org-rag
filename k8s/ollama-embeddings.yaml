# ============================================================
# Ollama Embeddings API — used by Open WebUI RAG ingestion
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-embeddings
  namespace: multi-org-rag
  labels:
    app: ollama-embeddings
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama-embeddings
  template:
    metadata:
      labels:
        app: ollama-embeddings
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          command:
            - sh
            - -c
          args:
            - |
              set -e
              OLLAMA_HOST=0.0.0.0:11434 ollama serve &
              pid="$!"
              trap 'kill "$pid"; wait "$pid"' TERM INT
              until OLLAMA_HOST=127.0.0.1:11434 ollama list >/dev/null 2>&1; do
                sleep 2
              done
              OLLAMA_HOST=127.0.0.1:11434 ollama pull "$OLLAMA_EMBEDDING_MODEL"
              wait "$pid"
          env:
            - name: OLLAMA_EMBEDDING_MODEL
              valueFrom:
                configMapKeyRef:
                  name: multi-org-config
                  key: OLLAMA_EMBEDDING_MODEL
            - name: OLLAMA_KEEP_ALIVE
              value: "24h"
          volumeMounts:
            - name: data
              mountPath: /root/.ollama
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "8Gi"
              nvidia.com/gpu: "1"
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - 'OLLAMA_HOST=127.0.0.1:11434 ollama show "$OLLAMA_EMBEDDING_MODEL" >/dev/null'
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 40
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - 'OLLAMA_HOST=127.0.0.1:11434 ollama list >/dev/null'
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ollama-embeddings-data
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule

---
apiVersion: v1
kind: Service
metadata:
  name: ollama-embeddings
  namespace: multi-org-rag
spec:
  type: NodePort
  selector:
    app: ollama-embeddings
  ports:
    - name: http
      port: 11434
      targetPort: 11434
      nodePort: 31134
