# ============================================================
# AIDAHO Copilot — n8n
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-aidaho
  namespace: multi-org-rag
  labels:
    app: n8n-aidaho
    org: aidaho
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: n8n-aidaho
  template:
    metadata:
      labels:
        app: n8n-aidaho
        org: aidaho
    spec:
      containers:
        - name: n8n
          image: n8nio/n8n:2.13.4
          ports:
            - containerPort: 5678
          envFrom:
            - configMapRef:
                name: n8n-shared-config
          env:
            - name: DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: multi-org-config
                  key: DOMAIN
            - name: N8N_ORG1_SUBDOMAIN
              valueFrom:
                configMapKeyRef:
                  name: multi-org-config
                  key: N8N_ORG1_SUBDOMAIN
            - name: N8N_HOST
              value: "$(N8N_ORG1_SUBDOMAIN).$(DOMAIN)"
            - name: N8N_EDITOR_BASE_URL
              value: "https://$(N8N_ORG1_SUBDOMAIN).$(DOMAIN)"
            - name: WEBHOOK_URL
              value: "https://$(N8N_ORG1_SUBDOMAIN).$(DOMAIN)/"
            - name: N8N_BASIC_AUTH_USER
              valueFrom:
                secretKeyRef:
                  name: multi-org-secrets
                  key: N8N_ADMIN_USER
            - name: N8N_BASIC_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: multi-org-secrets
                  key: N8N_ADMIN_PASSWORD
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: multi-org-secrets
                  key: N8N_ENCRYPTION_KEY_AIDAHO
          volumeMounts:
            - name: data
              mountPath: /home/node/.n8n
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: n8n-aidaho-data

---
apiVersion: v1
kind: Service
metadata:
  name: n8n-aidaho
  namespace: multi-org-rag
spec:
  selector:
    app: n8n-aidaho
  ports:
    - port: 5678
      targetPort: 5678
