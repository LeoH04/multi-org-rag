# ============================================================
# AIDAHO Copilot — Open WebUI
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui-aidaho
  namespace: multi-org-rag
  labels:
    app: openwebui-aidaho
    org: aidaho
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openwebui-aidaho
  template:
    metadata:
      labels:
        app: openwebui-aidaho
        org: aidaho
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo "Waiting for postgres..."; sleep 2; done']
      containers:
        - name: openwebui
          image: ghcr.io/open-webui/open-webui:v0.9.2
          ports:
            - containerPort: 8080
          # Shared OpenWebUI config (RAG, embedding, tika, etc.)
          envFrom:
            - configMapRef:
                name: openwebui-shared-config
          # Per-instance overrides
          env:
            # Database
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: multi-org-secrets
                  key: DATABASE_URL_AIDAHO
            # LLM backend
            - name: DEFAULT_MODELS
              valueFrom:
                configMapKeyRef:
                  name: multi-org-config
                  key: VLLM_MODEL_NAME
            - name: OPENAI_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: multi-org-secrets
                  key: VLLM_API_KEY
            - name: RAG_EXTERNAL_RERANKER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: multi-org-secrets
                  key: RERANK_API_KEY
            # Tavily
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: multi-org-secrets
                  key: TAVILY_API_KEY
            - name: DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: multi-org-config
                  key: DOMAIN
            - name: ORG1_SUBDOMAIN
              valueFrom:
                configMapKeyRef:
                  name: multi-org-config
                  key: ORG1_SUBDOMAIN
            # Branding
            - name: WEBUI_NAME
              value: "AIDAHO Copilot"
            - name: WEBUI_URL
              value: "https://$(ORG1_SUBDOMAIN).$(DOMAIN)"
            # Auth
            - name: WEBUI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: multi-org-secrets
                  key: SECRET_KEY_AIDAHO
            - name: WEBUI_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: multi-org-secrets
                  key: WEBUI_ADMIN_EMAIL
            - name: WEBUI_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: multi-org-secrets
                  key: WEBUI_ADMIN_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
          resources:
            requests:
              memory: "1Gi"
              cpu: "250m"
            limits:
              memory: "4Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openwebui-aidaho-data

---
apiVersion: v1
kind: Service
metadata:
  name: openwebui-aidaho
  namespace: multi-org-rag
spec:
  selector:
    app: openwebui-aidaho
  ports:
    - port: 8080
      targetPort: 8080
