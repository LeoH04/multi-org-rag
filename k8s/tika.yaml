# ============================================================
# Apache Tika — shared document extraction
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tika
  namespace: multi-org-rag
  labels:
    app: tika
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tika
  template:
    metadata:
      labels:
        app: tika
    spec:
      containers:
        - name: tika
          image: apache/tika
          ports:
            - containerPort: 9998
          readinessProbe:
            httpGet:
              path: /tika
              port: 9998
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: tika
  namespace: multi-org-rag
spec:
  selector:
    app: tika
  ports:
    - port: 9998
      targetPort: 9998
