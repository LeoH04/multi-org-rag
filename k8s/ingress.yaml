# ============================================================
# Kubernetes Ingress for AIDAHO public routing.
# Included by default in k8s/kustomization.yaml.
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multi-org-rag
  namespace: multi-org-rag
  annotations:
    # nginx ingress controller annotations
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: public
  rules:
    # AIDAHO Copilot (Open WebUI)
    - host: aidaho-copilot.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: openwebui-aidaho
                port:
                  number: 8080
    # AIDAHO Workflow (n8n)
    - host: aidaho-workflow.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: n8n-aidaho
                port:
                  number: 5678
