  #     NVIDIA_VISIBLE_DEVICES: ${VLLM_CHAT_VISIBLE_DEVICES}
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             device_ids:
  #                 - "${VLLM_CHAT_VISIBLE_DEVICES}"
  #             capabilities: [gpu]
  #   logging:
  #     driver: json-file
  #     options:
  #       max-size: "10m"
  #       max-file: "3"
  #   volumes:
  #     - vllm_cache:/root/.cache/huggingface
  #   networks:
  #     - backend

  # ──────────────────────────────────────────────
  # Shared vLLM Reranker API (OpenAI-compatible /v1/rerank) — CURRENTLY DISABLED
  # ──────────────────────────────────────────────
  # vllm-reranker:
  #   image: vllm/vllm-openai:latest
  #   entrypoint: ["vllm"]
  #   restart: unless-stopped
  #   ports:
  #     - "8001:8000"
  #   command:
  #     - serve
  #     - ${VLLM_RERANK_MODEL}
  #     - --runner
  #     - pooling
  #     - --gpu-memory-utilization
  #     - ${VLLM_RERANK_GPU_MEMORY_UTILIZATION}
  #     - --host
  #     - 0.0.0.0
  #     - --port
  #     - "8000"
  #     - --api-key
  #     - ${RERANK_API_KEY}
  #   environment:
  #     HF_TOKEN: ${HF_TOKEN:-}
  #     NVIDIA_VISIBLE_DEVICES: ${VLLM_RERANK_VISIBLE_DEVICES}
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             device_ids:
  #                 - "${VLLM_RERANK_VISIBLE_DEVICES}"
  #             capabilities: [gpu]
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -sf -H \"Authorization: Bearer ${RERANK_API_KEY}\" http://localhost:8000/v1/models >/dev/null || exit 1"]
  #     interval: 30s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 30s
  #   volumes:
  #     - vllm_cache:/root/.cache/huggingface
  #   networks:
  #     - backend

  # ──────────────────────────────────────────────
  # AIDAHO Copilot — Open WebUI
  # ──────────────────────────────────────────────
  openwebui-aidaho:
    image: ghcr.io/open-webui/open-webui:v0.8.12
    restart: unless-stopped
    ports:
      - "8080:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      # --- Database ---
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/openwebui_aidaho
      VECTOR_DB: pgvector
      # PGVECTOR_DB_URL defaults to DATABASE_URL — no need to set separately

      # --- LLM backend (NVIDIA hosted API) ---
      ENABLE_OPENAI_API: "true"
      OPENAI_API_BASE_URLS: ${NVIDIA_API_BASE_URL}
      DEFAULT_MODEL_PARAMS: '{"function_calling":"native"}'
      OPENAI_API_KEYS: ${NVIDIA_API_KEY}
      DEFAULT_MODELS: ${NVIDIA_MODEL_NAME}
      RAG_EMBEDDING_ENGINE: ${RAG_EMBEDDING_ENGINE}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL}
      ENABLE_WEB_SEARCH: ${ENABLE_WEB_SEARCH}
      WEB_SEARCH_ENGINE: ${WEB_SEARCH_ENGINE}
      WEB_LOADER_ENGINE: ${WEB_LOADER_ENGINE}
      RAG_TEXT_SPLITTER: token
      TIKTOKEN_ENCODING_NAME: cl100k_base
      CHUNK_SIZE: 1400
      CHUNK_OVERLAP: 200
      RAG_TOP_K: ${RAG_TOP_K}
      RAG_TOP_K_RERANKER: ${RAG_TOP_K_RERANKER}
      RAG_RELEVANCE_THRESHOLD: ${RAG_RELEVANCE_THRESHOLD}
      RAG_HYBRID_BM25_WEIGHT: ${RAG_HYBRID_BM25_WEIGHT}
      ENABLE_RAG_HYBRID_SEARCH: ${ENABLE_RAG_HYBRID_SEARCH}
      ENABLE_RAG_HYBRID_SEARCH_ENRICHED_TEXTS: ${ENABLE_RAG_HYBRID_SEARCH_ENRICHED_TEXTS}
      RAG_RERANKING_ENGINE: ""
      RAG_RERANKING_MODEL: ""
      # RAG_EXTERNAL_RERANKER_URL: http://vllm-reranker:8000/v1/rerank
      # RAG_EXTERNAL_RERANKER_API_KEY: ${RERANK_API_KEY}
      # RAG_EXTERNAL_RERANKER_TIMEOUT: ${RAG_EXTERNAL_RERANKER_TIMEOUT}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      WEB_SEARCH_RESULT_COUNT: ${WEB_SEARCH_RESULT_COUNT}

      # --- Document extraction (shared Tika) ---
      CONTENT_EXTRACTION_ENGINE: tika
      TIKA_SERVER_URL: http://tika:9998

      # --- Branding ---
      WEBUI_NAME: "AIDAHO Copilot"
      WEBUI_URL: https://${ORG1_SUBDOMAIN}.${DOMAIN}

      # --- Auth & admin ---
      WEBUI_SECRET_KEY: ${SECRET_KEY_AIDAHO}
      WEBUI_ADMIN_EMAIL: ${WEBUI_ADMIN_EMAIL}
      WEBUI_ADMIN_PASSWORD: ${WEBUI_ADMIN_PASSWORD}
      DEFAULT_LOCALE: de
      DEFAULT_USER_ROLE: pending
      ENABLE_API_KEYS: "true"

      # --- Config persistence (set to true only during initial setup) ---
      RESET_CONFIG_ON_START: ${OPENWEBUI_RESET_CONFIG_ON_START}
    volumes:
      - openwebui_aidaho_data:/app/backend/data
    depends_on:
      postgres:
        condition: service_healthy
      tika:
        condition: service_started
    networks:
      - backend

  # ──────────────────────────────────────────────
  # AIDAHO Copilot — n8n
  # ──────────────────────────────────────────────
  n8n-aidaho:
    image: n8nio/n8n:2.13.4
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: ${N8N_ORG1_SUBDOMAIN}.${DOMAIN}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_PROXY_HOPS: 1
      N8N_PUSH_BACKEND: websocket
      N8N_EDITOR_BASE_URL: https://${N8N_ORG1_SUBDOMAIN}.${DOMAIN}
      WEBHOOK_URL: https://${N8N_ORG1_SUBDOMAIN}.${DOMAIN}/
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_ADMIN_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_ADMIN_PASSWORD}
      N8N_METRICS: "true"
      N8N_METRICS_INCLUDE_MESSAGE_EVENT_BUS_METRICS: "true"
      N8N_METRICS_INCLUDE_WORKFLOW_STATISTICS: "true"
      N8N_SECURE_COOKIE: "false"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY_AIDAHO}
      TZ: Europe/Berlin
      GENERIC_TIMEZONE: Europe/Berlin
    volumes:
      - n8n_aidaho_data:/home/node/.n8n
    networks:
      - backend

  # ──────────────────────────────────────────────
  # Nginx — Reverse Proxy + Landing Page
  # ──────────────────────────────────────────────
  admin-monitor:
    build:
      context: ./admin-monitor
    restart: unless-stopped
    environment:
      PORT: 3000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ADMIN_USER: ${N8N_ADMIN_USER}
      N8N_ADMIN_PASSWORD: ${N8N_ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      openwebui-aidaho:
        condition: service_started
      n8n-aidaho:
        condition: service_started
    networks:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - DOMAIN=${DOMAIN}
      - ORG1_SUBDOMAIN=${ORG1_SUBDOMAIN}
      - N8N_ORG1_SUBDOMAIN=${N8N_ORG1_SUBDOMAIN}
    volumes:
      # Nginx config template — ${DOMAIN} is resolved by envsubst on startup
      - ./k8s/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      # Landing page
      - ./landing:/usr/share/nginx/html:ro
    depends_on:
      - admin-monitor
      - openwebui-aidaho
      - n8n-aidaho
    networks:
      - backend

  # ──────────────────────────────────────────────
  # Database Backup (runs pg_dump daily at 2 AM)
  # ──────────────────────────────────────────────
  backup:
    image: pgvector/pgvector:0.8.2-pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - backups:/backups
    entrypoint: |
      sh -c '
        echo "Backup service started. Running daily at 2:00 AM."
        while true; do
          # Sleep until 2 AM
          current_hour=$$(date +%H)
          current_min=$$(date +%M)
          if [ "$$current_hour" = "02" ] && [ "$$current_min" = "00" ]; then
            echo "[$$( date -Iseconds )] Starting backup..."
            pg_dump -h postgres -U $${POSTGRES_USER} -d openwebui_aidaho \
              | gzip > /backups/openwebui_aidaho_$$(date +%Y%m%d_%H%M%S).sql.gz
            echo "[$$( date -Iseconds )] Backed up openwebui_aidaho"
            # Keep only last 7 days of backups
            find /backups -name "*.sql.gz" -mtime +7 -delete
            echo "[$$( date -Iseconds )] Backup complete. Old backups cleaned."
          fi
          sleep 60
        done
      '
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

# ──────────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────────
volumes:
  postgres_data:
  # vllm_cache:  # DISABLED - vLLM services are commented out
  openwebui_aidaho_data:
  n8n_aidaho_data:
  backups:

# ──────────────────────────────────────────────
# Network
# ──────────────────────────────────────────────
networks:
  backend:
    driver: bridge
