# ============================================================
# AIDAHO Open WebUI — Docker Compose (Local Prototype)
# ============================================================
#
# Services:
#   - postgres       : PostgreSQL + pgvector
#   - tika           : Shared document extraction
#   - openwebui-aidaho: AIDAHO Copilot (Open WebUI)
#   - n8n-aidaho      : AIDAHO Workflows (n8n)
#   - nginx          : Reverse proxy + landing page
#
# Usage:
#   1. Edit .env — set passwords, domain, and vLLM variables
#   2. docker compose up -d
#   3. Start vLLM services and wait for models to download on first boot
#   4. Open http://localhost (or http://yourdomain.com)
#
#   With DOMAIN=localhost:
#     Landing page : http://localhost
#     Copilot      : http://${ORG1_SUBDOMAIN}.localhost
#     Workflows    : http://${N8N_ORG1_SUBDOMAIN}.localhost
#
#   With DOMAIN=uni-hohenheim.de:
#     Copilot      : https://${ORG1_SUBDOMAIN}.uni-hohenheim.de
#     Workflows    : https://${N8N_ORG1_SUBDOMAIN}.uni-hohenheim.de
# ============================================================

services:

  # ──────────────────────────────────────────────
  # Shared PostgreSQL + pgvector
  # ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:0.8.2-pg17
    restart: unless-stopped
    ports:
      - "5432:5432"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-multi-db.sql:/docker-entrypoint-initdb.d/init-multi-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  # ──────────────────────────────────────────────
  # Shared Apache Tika (document extraction)
  # ──────────────────────────────────────────────
  tika:
    image: apache/tika
    restart: unless-stopped
    networks:
      - backend

    # ──────────────────────────────────────────────
  # Shared vLLM Chat API (OpenAI-compatible) — CURRENTLY DISABLED
